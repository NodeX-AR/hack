<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="Play minecraft 1.8 in your browser" />
		<meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.8, 1.8.8" />
		<title>EaglercraftX 1.8 WASM-GC</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="EaglercraftX 1.8 WASM-GC" />
		<meta property="og:description" content="Play minecraft 1.8 in your browser" />
		<meta property="og:image" content="favicon.png" />
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<style>
			/* Autoclicker notification style */
			#autoclicker-notification {
				position: fixed;
				bottom: 20px;
				right: 20px;
				background-color: rgba(0,0,0,0.85);
				color: #00ff00;
				padding: 12px 24px;
				border-radius: 8px;
				font-family: 'Courier New', monospace;
				font-size: 16px;
				font-weight: bold;
				z-index: 9999;
				border: 2px solid #00ff00;
				box-shadow: 0 0 15px rgba(0,0,0,0.5);
				pointer-events: none;
				display: none;
				backdrop-filter: blur(5px);
			}
			
			/* Hotkey hint */
			.hotkey-hint {
				position: fixed;
				bottom: 20px;
				left: 20px;
				background-color: rgba(0,0,0,0.7);
				color: #ffaa00;
				padding: 8px 15px;
				border-radius: 8px;
				font-family: monospace;
				font-size: 14px;
				z-index: 9999;
				pointer-events: none;
				border: 1px solid #ffaa00;
			}
		</style>
		<script type="text/javascript" src="bootstrap.js"></script>
		<script type="text/javascript">
			"use strict";
			
			// ========== AUTO CLICKER SCRIPT ==========
			// Press 'F' to toggle autoclicker (17 clicks per second)
			let autoclickerEnabled = false;
			let autoclickerInterval = null;
			const CPS = 17;
			const CLICK_INTERVAL_MS = 1000 / CPS; // ~58.82ms between clicks
			
			// Function to simulate a left mouse click on the game canvas
			function simulateLeftClick() {
				// Find all canvas elements on the page
				const canvases = document.querySelectorAll('canvas');
				if (canvases.length === 0) return;
				
				// Target the game canvas (usually the first one or the one with largest area)
				let targetCanvas = null;
				let maxArea = 0;
				for (let canvas of canvases) {
					const area = canvas.width * canvas.height;
					if (area > maxArea && canvas.offsetParent !== null) {
						maxArea = area;
						targetCanvas = canvas;
					}
				}
				if (!targetCanvas && canvases.length > 0) targetCanvas = canvases[0];
				if (!targetCanvas) return;
				
				// Get center coordinates of the canvas for more accurate clicks
				const rect = targetCanvas.getBoundingClientRect();
				const centerX = rect.left + rect.width / 2;
				const centerY = rect.top + rect.height / 2;
				
				// Create and dispatch mouse down event
				const mouseDownEvent = new MouseEvent('mousedown', {
					view: window,
					bubbles: true,
					cancelable: true,
					clientX: centerX,
					clientY: centerY,
					buttons: 1,
					button: 0
				});
				targetCanvas.dispatchEvent(mouseDownEvent);
				
				// Create and dispatch mouse up event
				const mouseUpEvent = new MouseEvent('mouseup', {
					view: window,
					bubbles: true,
					cancelable: true,
					clientX: centerX,
					clientY: centerY,
					buttons: 0,
					button: 0
				});
				targetCanvas.dispatchEvent(mouseUpEvent);
				
				// Also dispatch click event for completeness
				const clickEvent = new MouseEvent('click', {
					view: window,
					bubbles: true,
					cancelable: true,
					clientX: centerX,
					clientY: centerY,
					button: 0
				});
				targetCanvas.dispatchEvent(clickEvent);
			}
			
			// Start autoclicker
			function startAutoclicker() {
				if (autoclickerInterval) return;
				autoclickerInterval = setInterval(simulateLeftClick, CLICK_INTERVAL_MS);
				console.log('[AutoClicker] ENABLED - clicking ' + CPS + ' times per second');
				showNotification('AutoClicker: ON (' + CPS + ' CPS)', '#00ff00');
			}
			
			// Stop autoclicker
			function stopAutoclicker() {
				if (autoclickerInterval) {
					clearInterval(autoclickerInterval);
					autoclickerInterval = null;
				}
				console.log('[AutoClicker] DISABLED');
				showNotification('AutoClicker: OFF', '#ff4444');
			}
			
			// Toggle autoclicker on/off
			function toggleAutoclicker() {
				autoclickerEnabled = !autoclickerEnabled;
				if (autoclickerEnabled) {
					startAutoclicker();
				} else {
					stopAutoclicker();
				}
			}
			
			// Simple on-screen notification
			let notificationTimeout = null;
			function showNotification(message, color) {
				let notification = document.getElementById('autoclicker-notification');
				if (!notification) {
					notification = document.createElement('div');
					notification.id = 'autoclicker-notification';
					notification.style.cssText = `
						position: fixed;
						bottom: 20px;
						right: 20px;
						background-color: rgba(0,0,0,0.85);
						color: ${color};
						padding: 12px 24px;
						border-radius: 8px;
						font-family: 'Courier New', monospace;
						font-size: 16px;
						font-weight: bold;
						z-index: 9999;
						border: 2px solid ${color};
						box-shadow: 0 0 15px rgba(0,0,0,0.5);
						pointer-events: none;
						backdrop-filter: blur(5px);
					`;
					document.body.appendChild(notification);
				}
				notification.textContent = message;
				notification.style.color = color;
				notification.style.border = '2px solid ' + color;
				notification.style.display = 'block';
				
				if (notificationTimeout) clearTimeout(notificationTimeout);
				notificationTimeout = setTimeout(() => {
					if (notification) notification.style.display = 'none';
				}, 1500);
			}
			
			// Add hotkey hint to page
			function addHotkeyHint() {
				let hint = document.getElementById('hotkey-hint');
				if (!hint) {
					hint = document.createElement('div');
					hint.id = 'hotkey-hint';
					hint.className = 'hotkey-hint';
					hint.innerHTML = '🔥 Press F to toggle autoclicker (17 CPS)';
					document.body.appendChild(hint);
				}
			}
			
			// Listen for 'F' key press
			document.addEventListener('keydown', function(event) {
				// Check for 'F' key (key code 70)
				if (event.key === 'f' || event.key === 'F') {
					event.preventDefault();
					event.stopPropagation();
					toggleAutoclicker();
				}
			});
			
			// Also listen for keydown on the game frame to catch if canvas steals focus
			const gameFrame = document.getElementById('game_frame');
			if (gameFrame) {
				gameFrame.addEventListener('keydown', function(event) {
					if (event.key === 'f' || event.key === 'F') {
						event.preventDefault();
						event.stopPropagation();
						toggleAutoclicker();
					}
				});
			}
			
			// Clean up when page unloads
			window.addEventListener('beforeunload', function() {
				if (autoclickerInterval) {
					clearInterval(autoclickerInterval);
				}
			});
			
			// ========== END AUTO CLICKER SCRIPT ==========
			
			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
				}else {
					
					// Add hotkey hint after page loads
					addHotkeyHint();
					
					// %%%%%%%%% launch options %%%%%%%%%%%%
					
					var relayId = Math.floor(Math.random() * 3);
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "assets.epw",
						worldsDB: "worlds",
						servers: [
							/* example: { addr: "ws://localhost:8081/", name: "Local test server" } */
						],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
						]
					};
					
					// %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
					
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.eaglercraftXOpts.joinServer = s;
					}
					
					// Log that autoclicker is ready
					console.log('EaglercraftX Loaded - Press F to toggle 17 CPS autoclicker!');
					
					main();
					
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
